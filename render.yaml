services:
  - type: web
    name: harbor-coffee-chatbot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 60
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: CHAT_MODEL
        value: claude-haiku-4-5-20251001
      - key: MAX_MESSAGES_PER_SESSION
        value: "20"
      - key: SUMMARIZE_AFTER_TURNS
        value: "10"
